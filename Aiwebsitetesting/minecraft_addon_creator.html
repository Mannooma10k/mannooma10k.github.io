
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');
  :root {
    --mc-green: #5a9e3a; --mc-green-dark: #3d7525; --mc-green-light: #8bc34a;
    --mc-blue: #3ab8c8; --mc-gold: #f0a030; --mc-red: #c83030;
    --mc-gray: #8a8a8a; --mc-dark: #1a1a1a; --mc-panel: #2d2d2d;
    --mc-border: #555; --mc-text: #f0f0f0; --mc-muted: #aaa;
    --mc-slot: #3c3c3c; --mc-slot-border: #1a1a1a; --mc-hover: #4a4a4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; }
  .app {
    font-family: 'Share Tech Mono', monospace;
    background: var(--mc-dark);
    color: var(--mc-text);
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid var(--mc-border);
    min-height: 600px;
  }
  .header {
    background: linear-gradient(135deg, #1a2e1a 0%, #0f1f0f 100%);
    border-bottom: 2px solid var(--mc-green-dark);
    padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .header-icon {
    width: 40px; height: 40px;
    background: var(--mc-green);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    border: 2px solid var(--mc-green-light);
    flex-shrink: 0;
  }
  .header-title {
    font-family: 'VT323', monospace;
    font-size: 26px;
    color: var(--mc-green-light);
    letter-spacing: 1px;
    line-height: 1;
  }
  .header-sub { font-size: 11px; color: var(--mc-muted); margin-top: 2px; }
  .steps-bar {
    display: flex;
    background: #111;
    border-bottom: 1px solid var(--mc-border);
  }
  .step-tab {
    flex: 1; padding: 10px 4px; text-align: center;
    font-size: 11px; color: var(--mc-muted);
    cursor: pointer; border-right: 1px solid var(--mc-border);
    transition: all 0.2s; position: relative;
  }
  .step-tab:last-child { border-right: none; }
  .step-tab.active { color: var(--mc-green-light); background: var(--mc-panel); }
  .step-tab.done { color: var(--mc-blue); }
  .step-tab.active::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: var(--mc-green);
  }
  .step-num {
    display: block; font-family: 'VT323', monospace;
    font-size: 20px; line-height: 1.2;
  }
  .content { padding: 20px; }
  .section-title {
    font-family: 'VT323', monospace; font-size: 22px;
    color: var(--mc-green-light); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 11px; color: var(--mc-muted); text-transform: uppercase; letter-spacing: 1px; }
  input, textarea, select {
    background: var(--mc-slot); border: 1px solid var(--mc-border);
    color: var(--mc-text); border-radius: 4px; padding: 8px 10px;
    font-family: 'Share Tech Mono', monospace; font-size: 13px;
    outline: none; transition: border-color 0.2s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--mc-green); }
  textarea { resize: vertical; min-height: 70px; }
  select option { background: var(--mc-panel); }
  .type-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
  }
  .type-btn {
    background: var(--mc-slot); border: 2px solid var(--mc-border);
    color: var(--mc-muted); border-radius: 6px; padding: 10px 4px;
    cursor: pointer; text-align: center; transition: all 0.2s; font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
  }
  .type-btn .icon { font-size: 22px; display: block; margin-bottom: 4px; }
  .type-btn.active { border-color: var(--mc-green); color: var(--mc-green-light); background: #1e3a1e; }
  .type-btn:hover:not(.active) { border-color: var(--mc-gray); color: var(--mc-text); background: var(--mc-hover); }
  .crafting-area { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
  .crafting-grid-wrap { flex-shrink: 0; }
  .crafting-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px;
    background: #111; padding: 8px; border-radius: 6px;
    border: 2px solid var(--mc-border);
  }
  .craft-slot {
    width: 56px; height: 56px; background: var(--mc-slot);
    border: 2px solid var(--mc-slot-border); border-radius: 3px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 26px; transition: all 0.15s; position: relative;
    box-shadow: inset 1px 1px 0 rgba(255,255,255,0.05), inset -1px -1px 0 rgba(0,0,0,0.5);
  }
  .craft-slot:hover { border-color: var(--mc-green); background: var(--mc-hover); }
  .craft-slot.has-item { border-color: #666; background: #2a2a2a; }
  .craft-arrow {
    display: flex; align-items: center; font-size: 28px; color: var(--mc-gold);
    padding: 0 8px; align-self: center;
  }
  .output-slot {
    width: 64px; height: 64px; background: var(--mc-slot);
    border: 2px solid var(--mc-gold); border-radius: 3px;
    display: flex; align-items: center; justify-content: center; font-size: 30px;
    box-shadow: inset 1px 1px 0 rgba(255,255,255,0.05), inset -1px -1px 0 rgba(0,0,0,0.5);
    align-self: center;
  }
  .item-palette { flex: 1; min-width: 200px; }
  .palette-label { font-size: 11px; color: var(--mc-muted); margin-bottom: 8px; text-transform: uppercase; }
  .palette-grid { display: flex; flex-wrap: wrap; gap: 4px; max-height: 200px; overflow-y: auto; }
  .palette-grid::-webkit-scrollbar { width: 4px; }
  .palette-grid::-webkit-scrollbar-thumb { background: var(--mc-border); border-radius: 2px; }
  .palette-item {
    width: 38px; height: 38px; background: var(--mc-slot); border: 1px solid var(--mc-border);
    border-radius: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all 0.15s; position: relative;
  }
  .palette-item:hover { border-color: var(--mc-green); background: var(--mc-hover); }
  .palette-item.selected { border-color: var(--mc-green); background: #1e3a1e; box-shadow: 0 0 0 1px var(--mc-green); }
  .palette-item[title]:hover::after {
    content: attr(title); position: absolute; bottom: 110%; left: 50%;
    transform: translateX(-50%); background: #000; color: #fff;
    padding: 3px 6px; border-radius: 3px; white-space: nowrap; font-size: 10px;
    pointer-events: none; z-index: 10;
  }
  .btn {
    padding: 10px 20px; border-radius: 6px; border: 2px solid;
    cursor: pointer; font-family: 'VT323', monospace; font-size: 18px;
    transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
    letter-spacing: 0.5px;
  }
  .btn-primary {
    background: var(--mc-green-dark); border-color: var(--mc-green);
    color: var(--mc-green-light);
  }
  .btn-primary:hover:not(:disabled) { background: var(--mc-green); color: #fff; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary {
    background: transparent; border-color: var(--mc-border); color: var(--mc-muted);
  }
  .btn-secondary:hover { border-color: var(--mc-gray); color: var(--mc-text); }
  .btn-blue {
    background: #1a3a4a; border-color: var(--mc-blue); color: var(--mc-blue);
  }
  .btn-blue:hover { background: var(--mc-blue); color: #fff; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
  .generating-box {
    text-align: center; padding: 40px 20px;
  }
  .spinner {
    width: 48px; height: 48px; border: 3px solid var(--mc-border);
    border-top-color: var(--mc-green); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .gen-text { font-family: 'VT323', monospace; font-size: 22px; color: var(--mc-green-light); }
  .gen-sub { font-size: 12px; color: var(--mc-muted); margin-top: 6px; }
  .error-box {
    background: #3a1a1a; border: 1px solid var(--mc-red); border-radius: 6px;
    padding: 12px 16px; color: #ff8888; font-size: 12px; margin-top: 12px;
  }
  .files-tabs { display: flex; gap: 2px; margin-bottom: 0; flex-wrap: wrap; }
  .file-tab {
    padding: 7px 12px; background: var(--mc-slot); border: 1px solid var(--mc-border);
    border-bottom: none; cursor: pointer; font-size: 11px; color: var(--mc-muted);
    border-radius: 4px 4px 0 0; transition: all 0.15s;
  }
  .file-tab.active { background: var(--mc-panel); color: var(--mc-green-light); border-color: var(--mc-green); }
  .code-block {
    background: #111; border: 1px solid var(--mc-border); border-radius: 0 6px 6px 6px;
    padding: 16px; font-size: 12px; line-height: 1.6; overflow-x: auto;
    max-height: 340px; overflow-y: auto; font-family: 'Share Tech Mono', monospace;
    color: #d4d4d4; white-space: pre-wrap; word-break: break-all;
  }
  .code-block::-webkit-scrollbar { width: 6px; height: 6px; }
  .code-block::-webkit-scrollbar-thumb { background: var(--mc-border); border-radius: 3px; }
  .success-banner {
    background: #1a3a1a; border: 1px solid var(--mc-green); border-radius: 6px;
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px;
  }
  .success-icon { font-size: 20px; }
  .success-text { font-size: 12px; color: var(--mc-green-light); }
  .files-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .copy-btn {
    padding: 5px 10px; background: transparent; border: 1px solid var(--mc-border);
    color: var(--mc-muted); border-radius: 4px; cursor: pointer; font-size: 11px;
    font-family: 'Share Tech Mono', monospace; transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--mc-blue); color: var(--mc-blue); }
  .info-tip {
    background: #1a2a3a; border: 1px solid #2a4a6a; border-radius: 6px;
    padding: 10px 14px; font-size: 11px; color: #7abfdf; margin-top: 12px;
    line-height: 1.6;
  }
  .progress-dots { display: flex; gap: 6px; justify-content: center; margin-top: 16px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--mc-border); transition: all 0.3s; }
  .dot.active { background: var(--mc-green); transform: scale(1.3); }
</style>

<div class="app" id="app">
  <div class="header">
    <div class="header-icon">⚒️</div>
    <div>
      <div class="header-title">MINECRAFT ADDON FORGE</div>
      <div class="header-sub">AI-powered Bedrock Edition addon generator</div>
    </div>
  </div>
  <div class="steps-bar" id="stepsBar">
    <div class="step-tab active" data-step="1"><span class="step-num">01</span>Addon Info</div>
    <div class="step-tab" data-step="2"><span class="step-num">02</span>Item / Block</div>
    <div class="step-tab" data-step="3"><span class="step-num">03</span>Recipe</div>
    <div class="step-tab" data-step="4"><span class="step-num">04</span>Generate</div>
  </div>
  <div class="content" id="mainContent"></div>
</div>

<script>
const MC_ITEMS = [
  {id:"air",label:"Empty",e:"⬜"},{id:"oak_log",label:"Oak Log",e:"🪵"},
  {id:"oak_planks",label:"Oak Planks",e:"🟫"},{id:"stone",label:"Stone",e:"🪨"},
  {id:"cobblestone",label:"Cobblestone",e:"🔲"},{id:"iron_ingot",label:"Iron Ingot",e:"⚙️"},
  {id:"gold_ingot",label:"Gold Ingot",e:"🟡"},{id:"diamond",label:"Diamond",e:"💎"},
  {id:"stick",label:"Stick",e:"🥢"},{id:"string",label:"String",e:"🧵"},
  {id:"feather",label:"Feather",e:"🪶"},{id:"flint",label:"Flint",e:"🖤"},
  {id:"leather",label:"Leather",e:"🟤"},{id:"wool",label:"Wool",e:"🟧"},
  {id:"sand",label:"Sand",e:"🟨"},{id:"glass",label:"Glass",e:"🔵"},
  {id:"redstone",label:"Redstone",e:"🔴"},{id:"gunpowder",label:"Gunpowder",e:"⚫"},
  {id:"coal",label:"Coal",e:"⬛"},{id:"bone",label:"Bone",e:"🦴"},
  {id:"blaze_rod",label:"Blaze Rod",e:"🔥"},{id:"ender_pearl",label:"Ender Pearl",e:"🟢"},
  {id:"nether_star",label:"Nether Star",e:"⭐"},{id:"netherite_ingot",label:"Netherite",e:"🔮"}
];

const TYPES = [
  {id:"item",label:"Item",icon:"🗡️"},{id:"block",label:"Block",icon:"🟩"},
  {id:"weapon",label:"Weapon",icon:"⚔️"},{id:"tool",label:"Tool",icon:"⛏️"},
  {id:"armor",label:"Armor",icon:"🛡️"}
];

let state = {
  step: 1,
  addonName: "", addonDesc: "",
  itemName: "", itemDesc: "", itemType: "item", effects: "",
  grid: Array(9).fill("air"),
  selectedPalette: "oak_log",
  generated: null, activeFile: 0,
  generating: false, error: null, copied: false
};

function getEmoji(id) {
  return MC_ITEMS.find(i=>i.id===id)?.e||"⬜";
}

function render() {
  const c = document.getElementById('mainContent');
  const tabs = document.querySelectorAll('.step-tab');
  tabs.forEach(t => {
    const n = parseInt(t.dataset.step);
    t.className = 'step-tab' + (n===state.step?' active':n<state.step?' done':'');
  });

  if (state.generating) {
    c.innerHTML = `
      <div class="generating-box">
        <div class="spinner"></div>
        <div class="gen-text">FORGING YOUR ADDON...</div>
        <div class="gen-sub">Claude is crafting your Minecraft addon files</div>
        <div class="progress-dots">
          <div class="dot active"></div><div class="dot active"></div><div class="dot active"></div><div class="dot"></div>
        </div>
      </div>`;
    animateDots();
    return;
  }

  if (state.step === 1) renderStep1(c);
  else if (state.step === 2) renderStep2(c);
  else if (state.step === 3) renderStep3(c);
  else if (state.step === 4) renderStep4(c);
}

function animateDots() {
  let i = 0;
  const iv = setInterval(() => {
    const dots = document.querySelectorAll('.dot');
    if (!dots.length) { clearInterval(iv); return; }
    dots.forEach((d,idx) => d.className = 'dot'+(idx<=i%4?' active':''));
    i++;
  }, 400);
}

function renderStep1(c) {
  c.innerHTML = `
    <div class="section-title">🌍 Addon Information</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Addon Name *</label>
        <input id="addonName" type="text" placeholder="e.g. Magic Weapons Pack" value="${escH(state.addonName)}">
      </div>
      <div class="form-group">
        <label>Version</label>
        <input id="addonVersion" type="text" placeholder="1.0.0" value="1.0.0" readonly style="opacity:0.5">
      </div>
      <div class="form-group full">
        <label>Description</label>
        <textarea id="addonDesc" placeholder="Describe what your addon does...">${escH(state.addonDesc)}</textarea>
      </div>
    </div>
    <div class="info-tip">
      💡 Tip: Be descriptive! The more detail you give, the better the AI will generate your addon.
    </div>
    <div class="nav-row">
      <div></div>
      <button class="btn btn-primary" onclick="goNext()">NEXT: ITEM / BLOCK →</button>
    </div>`;
  document.getElementById('addonName').oninput = e => state.addonName = e.target.value;
  document.getElementById('addonDesc').oninput = e => state.addonDesc = e.target.value;
}

function renderStep2(c) {
  const typeBtns = TYPES.map(t => `
    <div class="type-btn${state.itemType===t.id?' active':''}" onclick="setType('${t.id}')">
      <span class="icon">${t.icon}</span>${t.label}
    </div>`).join('');

  c.innerHTML = `
    <div class="section-title">🗡️ Item / Block Details</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Item Identifier *</label>
        <input id="itemName" type="text" placeholder="e.g. thunder_sword" value="${escH(state.itemName)}">
      </div>
      <div class="form-group">
        <label>Display Name</label>
        <input id="itemDisplayName" type="text" placeholder="e.g. Thunder Sword" value="${escH(state.itemDisplayName||'')}">
      </div>
      <div class="form-group full">
        <label>Item Type</label>
        <div class="type-grid">${typeBtns}</div>
      </div>
      <div class="form-group full">
        <label>Description / Lore</label>
        <textarea id="itemDesc" placeholder="What does this item do? What lore does it have?">${escH(state.itemDesc)}</textarea>
      </div>
      <div class="form-group full">
        <label>Special Effects / Abilities</label>
        <textarea id="effects" placeholder="e.g. Strikes lightning on hit, gives speed boost when held, explodes on death...">${escH(state.effects)}</textarea>
      </div>
    </div>
    <div class="nav-row">
      <button class="btn btn-secondary" onclick="goPrev()">← BACK</button>
      <button class="btn btn-primary" onclick="goNext()">NEXT: CRAFTING RECIPE →</button>
    </div>`;
  document.getElementById('itemName').oninput = e => state.itemName = e.target.value.replace(/\s+/g,'_').toLowerCase();
  document.getElementById('itemDisplayName').oninput = e => state.itemDisplayName = e.target.value;
  document.getElementById('itemDesc').oninput = e => state.itemDesc = e.target.value;
  document.getElementById('effects').oninput = e => state.effects = e.target.value;
}

function setType(t) {
  state.itemType = t;
  render();
}

function renderStep3(c) {
  const gridHTML = state.grid.map((item,i) => `
    <div class="craft-slot${item!=='air'?' has-item':''}" onclick="clickSlot(${i})" title="${item!=='air'?MC_ITEMS.find(x=>x.id===item)?.label||item:'Empty'}">
      ${item!=='air'?getEmoji(item):''}
    </div>`).join('');

  const paletteHTML = MC_ITEMS.map(item => `
    <div class="palette-item${state.selectedPalette===item.id?' selected':''}"
      title="${item.label}" onclick="selectPalette('${item.id}')">
      ${item.e}
    </div>`).join('');

  const outputEmoji = state.itemType==='weapon'?'⚔️':state.itemType==='block'?'🟩':state.itemType==='tool'?'⛏️':state.itemType==='armor'?'🛡️':'📦';

  c.innerHTML = `
    <div class="section-title">🔨 Crafting Recipe</div>
    <div style="font-size:11px;color:var(--mc-muted);margin-bottom:16px;">
      Select a material from the palette, then click grid slots to place it. Click again to remove.
    </div>
    <div class="crafting-area">
      <div class="crafting-grid-wrap">
        <div style="font-size:11px;color:var(--mc-muted);margin-bottom:6px;text-align:center;">CRAFTING GRID</div>
        <div class="crafting-grid">${gridHTML}</div>
      </div>
      <div class="craft-arrow">➡</div>
      <div>
        <div style="font-size:11px;color:var(--mc-muted);margin-bottom:6px;text-align:center;">OUTPUT</div>
        <div class="output-slot">${outputEmoji}</div>
        <div style="font-size:10px;color:var(--mc-gold);text-align:center;margin-top:4px;">${escH(state.itemName||'custom_item')}</div>
      </div>
      <div class="item-palette">
        <div class="palette-label">📦 Material Palette — Selected: ${MC_ITEMS.find(x=>x.id===state.selectedPalette)?.label||'?'}</div>
        <div class="palette-grid">${paletteHTML}</div>
        <div style="margin-top:8px;">
          <button class="copy-btn" onclick="clearGrid()">🗑 Clear Grid</button>
        </div>
      </div>
    </div>
    <div class="info-tip">
      💡 Leave the grid empty to generate a shapeless recipe, or fill it for a shaped recipe.
    </div>
    <div class="nav-row">
      <button class="btn btn-secondary" onclick="goPrev()">← BACK</button>
      <button class="btn btn-primary" onclick="generateAddon()">⚡ FORGE ADDON WITH AI →</button>
    </div>`;
}

function renderStep4(c) {
  if (!state.generated) {
    c.innerHTML = `
      <div class="error-box">No generated content found. Please go back and generate again.</div>
      <div class="nav-row"><button class="btn btn-secondary" onclick="goPrev()">← BACK</button></div>`;
    return;
  }

  const files = [
    { name: 'manifest.json', key: 'manifest', icon: '📋' },
    { name: 'item.json', key: 'item_behavior', icon: '🗡️' },
    { name: 'recipe.json', key: 'recipe', icon: '🔨' },
    { name: 'main.js', key: 'script', icon: '📜' },
    { name: 'README.md', key: 'readme', icon: '📖' },
  ];

  const tabsHTML = files.map((f,i) => `
    <div class="file-tab${state.activeFile===i?' active':''}" onclick="setFile(${i})">
      ${f.icon} ${f.name}
    </div>`).join('');

  const activeF = files[state.activeFile];
  const content = state.generated[activeF.key] || '// No content generated';

  c.innerHTML = `
    <div class="success-banner">
      <span class="success-icon">✅</span>
      <div class="success-text">
        <strong>Addon successfully forged!</strong><br>
        Your Minecraft Bedrock addon files are ready. Copy each file into your behavior pack folder.
      </div>
    </div>
    <div class="files-tabs">${tabsHTML}</div>
    <div class="code-block" id="codeBlock">${escH(content)}</div>
    <div class="files-row">
      <button class="copy-btn" onclick="copyCode()">📋 Copy File</button>
      <button class="copy-btn" onclick="copyAll()">📦 Copy All as JSON</button>
    </div>
    <div class="info-tip" style="margin-top:12px;">
      📁 <strong>Install guide:</strong> Create a behavior pack folder and place files as shown:
      <code style="display:block;margin-top:6px;color:#afd7ff;font-size:11px;">
      behavior_pack/<br>
      ├── manifest.json<br>
      ├── scripts/main.js<br>
      ├── items/${escH(state.itemName||'custom_item')}.json<br>
      └── recipes/${escH(state.itemName||'custom_item')}_crafting.json
      </code>
    </div>
    <div class="nav-row">
      <button class="btn btn-secondary" onclick="resetAll()">🔄 CREATE NEW ADDON</button>
      <button class="btn btn-blue" onclick="state.step=3;render()">← EDIT RECIPE</button>
    </div>
    ${state.error?`<div class="error-box">${escH(state.error)}</div>`:''}`;
}

function clickSlot(i) {
  const g = [...state.grid];
  if (g[i] === state.selectedPalette) g[i] = 'air';
  else g[i] = state.selectedPalette;
  state.grid = g;
  render();
}

function selectPalette(id) {
  state.selectedPalette = id;
  render();
}

function clearGrid() {
  state.grid = Array(9).fill('air');
  render();
}

function setFile(i) {
  state.activeFile = i;
  renderStep4(document.getElementById('mainContent'));
}

function goNext() {
  if (state.step < 3) { state.step++; render(); }
}
function goPrev() {
  if (state.step > 1) { state.step--; render(); }
}

async function generateAddon() {
  state.generating = true;
  state.error = null;
  render();

  const gridStr = state.grid.map(id => id==='air'?'empty':id);
  const itemId = (state.itemName||'custom_item').toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');

  const prompt = `Generate a complete Minecraft Bedrock Edition addon. Return ONLY valid JSON object, no markdown backticks, no explanation outside JSON.

Specs:
- Addon Name: ${state.addonName||'CustomAddon'}
- Description: ${state.addonDesc||'A custom addon'}
- Item Identifier: myaddon:${itemId}
- Display Name: ${state.itemDisplayName||itemId.replace(/_/g,' ')}
- Item Type: ${state.itemType}
- Item Description: ${state.itemDesc||'A custom item'}
- Special Effects: ${state.effects||'none'}
- Crafting Grid (3x3, row by row): ${gridStr.slice(0,3).join('|')} / ${gridStr.slice(3,6).join('|')} / ${gridStr.slice(6,9).join('|')}

Return this exact JSON structure with complete file contents as strings:
{"manifest":"...","item_behavior":"...","recipe":"...","script":"...","readme":"..."}

Rules:
- manifest.json: valid Bedrock manifest with random UUIDs, min_engine_version [1,20,0], modules for script and resources
- item_behavior: items/${itemId}.json with full components for the ${state.itemType} type, attack damage, durability etc
- recipe: recipes/${itemId}_crafting.json shaped or shapeless based on grid (use minecraft: prefix for vanilla items)
- script: scripts/main.js using @minecraft/server 1.15.0, implement the special effects with event subscriptions
- readme: markdown installation guide`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: 'You are an expert Minecraft Bedrock addon developer. Return ONLY a valid JSON object with keys: manifest, item_behavior, recipe, script, readme. Each value is the complete file content as a string. No markdown fences, no preamble.',
        messages: [{role:'user', content: prompt}]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b=>b.type==='text')?.text || '';
    const clean = text.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
    const parsed = JSON.parse(clean);
    state.generated = parsed;
    state.step = 4;
    state.activeFile = 0;
  } catch(err) {
    state.error = 'Generation failed: ' + err.message + '. Try again.';
    state.step = 3;
  }
  state.generating = false;
  render();
}

function copyCode() {
  const files = ['manifest','item_behavior','recipe','script','readme'];
  const key = files[state.activeFile];
  navigator.clipboard.writeText(state.generated?.[key]||'').then(() => {
    const btn = event.target;
    btn.textContent = '✅ Copied!';
    setTimeout(()=>btn.textContent='📋 Copy File', 1500);
  });
}

function copyAll() {
  navigator.clipboard.writeText(JSON.stringify(state.generated, null, 2)).then(() => {
    const btn = event.target;
    btn.textContent = '✅ Copied All!';
    setTimeout(()=>btn.textContent='📦 Copy All as JSON', 1500);
  });
}

function resetAll() {
  state = {
    step:1, addonName:'', addonDesc:'', itemName:'', itemDesc:'',
    itemType:'item', effects:'', grid:Array(9).fill('air'),
    selectedPalette:'oak_log', generated:null, activeFile:0,
    generating:false, error:null
  };
  render();
}

function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

render();
</script>
